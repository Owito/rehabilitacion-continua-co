name: Actualizar oferta (semanal)

on:
  schedule:
    # Lunes 11:00 UTC = 6:00 AM hora Colombia (UTC-5)
    - cron: '0 11 * * 1'
  workflow_dispatch: # permite ejecutarlo manualmente desde la pestaña Actions

permissions:
  contents: write   # para commitear cursos.json
  models: read      # para usar GitHub Models (LLM gratis)

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Ejecutar actualización
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/actualizar-cursos.mjs

      - name: Commit si hubo cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain src/data/cursos.json)" ]]; then
            git add src/data/cursos.json
            git commit -m "chore: actualización automática semanal de la oferta"
            git push
            echo "Cambios publicados (esto dispara el deploy)."
          else
            echo "Sin cambios en la oferta esta semana."
          fi
